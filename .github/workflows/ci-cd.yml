name: CI/CD Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
      - name: Update GitOps repository
        shell: powershell  # or pwsh
        env:
          GIT_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          # Clone the repository
          git clone https://github.com/alactic/grade-api-gitops.git gitops
          cd gitops

          # Update image tag in deployment.yaml
          $file = "deployment.yaml"
          $oldImage = "image: ghcr.io/${{ github.repository }}:.*"
          $newImage = "image: ghcr.io/${{ github.repository }}:${{ github.sha }}"
          (Get-Content $file) -replace $oldImage, $newImage | Set-Content $file

          # Commit and push
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add deployment.yaml
          git commit -m "Update image to ${{ github.sha }}"
          git push -f https://${env:GIT_TOKEN}@github.com/alactic/grade-api-gitops.git main
